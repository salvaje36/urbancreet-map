<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>어반크리트 설계업체 지도</title></head>
<body style="margin:0">
<script>
fetch('https://gist.githubusercontent.com/salvaje36/516345f129876eb50e4c7311dc36bfce/raw/%EC%96%B4%EB%B0%98%ED%81%AC%EB%A6%AC%ED%8A%B8_%EC%84%A4%EA%B3%84%EC%97%85%EC%B2%B4%EC%A7%80%EB%8F%84_%EB%84%A4%EC%9D%B4%EB%B2%84.html')
  .then(r=>r.text())
  .then(s=>{
    const bytes=new Uint8Array(s.length);
    for(let i=0;i<s.length;i++)bytes[i]=s.charCodeAt(i)&0xFF;
    const html=new TextDecoder('utf-8').decode(bytes);
    location.replace(URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'})));
  })
</script>
</body></html>
